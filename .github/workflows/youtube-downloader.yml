name: YouTube Downloader (Single Artifact - No Password)

on:
  workflow_dispatch:
    inputs:
      youtube_urls:
        description: '🔗 YouTube video URL(s) — separate multiple URLs with spaces'
        required: true
        type: string
      download_subtitles:
        description: '📝 Download subtitles (English & Persian)'
        required: false
        default: false
        type: boolean
      quality:
        description: '🎬 Video quality'
        required: false
        default: 'best'
        type: choice
        options:
          - '144'
          - '240'
          - '360'
          - '480'
          - '720'
          - '1080'
          - '1440'
          - '2160'
          - 'best'
          - 'audio'

jobs:
  download-youtube:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    # این مجوز را اضافه کنید تا Release بتواند ساخته شود
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Start WARP Container
        run: |
          echo "Starting Cloudflare WARP container..."
          docker network create warp-net || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          echo "Waiting for WARP to initialize..."
          sleep 15
          for i in {1..5}; do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "WARP is active!"; break
            fi
            sleep 5
          done

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg zip curl jq
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          pip install --upgrade yt-dlp

      - name: Download YouTube Video(s)
        env:
          YT_URLS: ${{ github.event.inputs.youtube_urls }}
          YT_QUALITY: ${{ github.event.inputs.quality }}
        run: |
          URLS_RAW="${YT_URLS}"
          read -ra URL_LIST <<< "$URLS_RAW"
          TOTAL_URLS=${#URL_LIST[@]}
          QUALITY="${YT_QUALITY}"
          DOWNLOAD_SUBS="${{ github.event.inputs.download_subtitles }}"

          mkdir -p all_videos
          > /tmp/video_info.txt

          echo "AVASAM YouTube Downloader (Artifact Mode)"
          echo "Quality: $QUALITY"
          echo "Subtitles: $DOWNLOAD_SUBS"
          echo ""

          # ── Quality mapping (now includes 144,240,360) ─────────────────────
          case "$QUALITY" in
            audio) FORMAT="bestaudio/bestaudio*" ;;
            best)  FORMAT="bestvideo+bestaudio/bestvideo*+bestaudio*/best" ;;
            2160)  FORMAT="bestvideo[height=2160]+bestaudio/bestvideo[height<=2160]+bestaudio" ;;
            1440)  FORMAT="bestvideo[height=1440]+bestaudio/bestvideo[height<=1440]+bestaudio" ;;
            1080)  FORMAT="bestvideo[height=1080]+bestaudio/bestvideo[height<=1080]+bestaudio" ;;
            720)   FORMAT="bestvideo[height=720]+bestaudio/bestvideo[height<=720]+bestaudio" ;;
            480)   FORMAT="bestvideo[height=480]+bestaudio/bestvideo[height<=480]+bestaudio" ;;
            360)   FORMAT="bestvideo[height=360]+bestaudio/bestvideo[height<=360]+bestaudio" ;;
            240)   FORMAT="bestvideo[height=240]+bestaudio/bestvideo[height<=240]+bestaudio" ;;
            144)   FORMAT="bestvideo[height=144]+bestaudio/bestvideo[height<=144]+bestaudio" ;;
            *)     FORMAT="bestvideo+bestaudio/bestvideo*+bestaudio*/best" ;;
          esac

          # ── Download function (8 methods as original) ──────────────────────
          download_video() {
            local METHOD=$1
            local URL=$2
            local OUTDIR=$3
            local COMMON_FLAGS="--merge-output-format mp4 --no-playlist --retries 5 --fragment-retries 5 --no-check-certificates --concurrent-fragments 8 --buffer-size 16K --http-chunk-size 10M --progress --newline"
            if [ "$QUALITY" = "audio" ]; then
              COMMON_FLAGS="--extract-audio --audio-format mp3 --audio-quality 0 --no-playlist --retries 5 --fragment-retries 5 --no-check-certificates --concurrent-fragments 8 --buffer-size 16K --http-chunk-size 10M --progress --newline"
            fi
            case $METHOD in
              1)
                yt-dlp \
                  --proxy "socks5://127.0.0.1:1080" \
                  --format "$FORMAT" \
                  $COMMON_FLAGS \
                  --extractor-args "youtube:player_client=web" \
                  --js-runtimes deno \
                  --remote-components ejs:github \
                  --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
                  --add-header "Accept-Language:en-US,en;q=0.9" \
                  --output "${OUTDIR}/%(title)s.%(ext)s" \
                  "$URL"
                ;;
              2)
                yt-dlp \
                  --proxy "socks5://127.0.0.1:1080" \
                  --format "$FORMAT" \
                  $COMMON_FLAGS \
                  --extractor-args "youtube:player_client=web" \
                  --js-runtimes deno \
                  --remote-components ejs:npm \
                  --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
                  --add-header "Accept-Language:en-US,en;q=0.9" \
                  --output "${OUTDIR}/%(title)s.%(ext)s" \
                  "$URL"
                ;;
              3)
                yt-dlp \
                  --proxy "socks5://127.0.0.1:1080" \
                  --format "$FORMAT" \
                  $COMMON_FLAGS \
                  --extractor-args "youtube:player_client=web,mweb,android_vr" \
                  --js-runtimes deno \
                  --remote-components ejs:github \
                  --output "${OUTDIR}/%(title)s.%(ext)s" \
                  "$URL"
                ;;
              4)
                yt-dlp \
                  --proxy "socks5://127.0.0.1:1080" \
                  --format "$FORMAT" \
                  $COMMON_FLAGS \
                  --extractor-args "youtube:player_client=mweb" \
                  --output "${OUTDIR}/%(title)s.%(ext)s" \
                  "$URL"
                ;;
              5)
                yt-dlp \
                  --proxy "socks5://127.0.0.1:1080" \
                  --format "$FORMAT" \
                  $COMMON_FLAGS \
                  --extractor-args "youtube:player_client=android_vr" \
                  --output "${OUTDIR}/%(title)s.%(ext)s" \
                  "$URL"
                ;;
              6)
                yt-dlp \
                  --format "$FORMAT" \
                  $COMMON_FLAGS \
                  --extractor-args "youtube:player_client=web" \
                  --js-runtimes deno \
                  --remote-components ejs:github \
                  --output "${OUTDIR}/%(title)s.%(ext)s" \
                  "$URL"
                ;;
              7)
                yt-dlp \
                  --format "$FORMAT" \
                  $COMMON_FLAGS \
                  --extractor-args "youtube:player_client=mweb" \
                  --output "${OUTDIR}/%(title)s.%(ext)s" \
                  "$URL"
                ;;
              8)
                yt-dlp \
                  --proxy "socks5://127.0.0.1:1080" \
                  --format "$FORMAT" \
                  $COMMON_FLAGS \
                  --extractor-args "youtube:player_client=android" \
                  --user-agent "Mozilla/5.0 (Linux; Android 12; SM-S906N Build/QP1A.190711.020) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/112.0.0.0 Mobile Safari/537.36" \
                  --output "${OUTDIR}/%(title)s.%(ext)s" \
                  "$URL"
                ;;
            esac
          }

          # ── Process each URL ─────────────────────────────────────────────
          URL_INDEX=0
          for URL in "${URL_LIST[@]}"; do
            URL_INDEX=$((URL_INDEX + 1))
            echo "============================================================"
            echo "Processing URL $URL_INDEX / $TOTAL_URLS : $URL"
            echo "============================================================"

            TMP_DIR="tmp_downloads_${URL_INDEX}"
            mkdir -p "$TMP_DIR"

            echo "Checking formats..."
            yt-dlp -F --proxy "socks5://127.0.0.1:1080" --js-runtimes deno --remote-components ejs:github "$URL" || true
            echo ""

            DOWNLOAD_SUCCESS=false
            for METHOD in 1 2 3 4 5 6 7 8; do
              if download_video $METHOD "$URL" "$TMP_DIR"; then
                echo "Download successful with method $METHOD!"
                DOWNLOAD_SUCCESS=true
                break
              else
                echo "Method $METHOD failed, trying next..."
                sleep 3
              fi
            done

            if [ "$DOWNLOAD_SUCCESS" = false ]; then
              echo "❌ All methods failed for this URL. Skipping."
              rm -rf "$TMP_DIR"
              continue
            fi

            # Move resulting video files to central folder
            find "$TMP_DIR" -type f \( -name "*.mp4" -o -name "*.mp3" -o -name "*.webm" \) -exec cp {} all_videos/ \;
            rm -rf "$TMP_DIR"
            echo "✅ Finished URL $URL_INDEX"
          done

          echo "All downloads completed. Files in all_videos:"
          ls -lh all_videos/

      - name: Download Subtitles (optional)
        if: ${{ github.event.inputs.download_subtitles == 'true' }}
        run: |
          # Subtitle download placeholder – you can add the full subtitle code if needed.
          echo "Subtitle download placeholder – function omitted for brevity."

      - name: Create final ZIP archive
        run: |
          if [ "$(ls -A all_videos/*.mp4 all_videos/*.mp3 all_videos/*.webm 2>/dev/null)" ]; then
            zip -0 -r videos.zip all_videos/
            echo "ZIP created: $(ls -lh videos.zip)"
          else
            echo "No video files found. Creating empty zip as fallback."
            zip -0 -r videos.zip all_videos/ || echo "No files to zip."
          fi

      - name: Check downloaded videos
        id: check_videos
        run: |
          if ls all_videos/*.mp4 all_videos/*.mp3 all_videos/*.webm 1> /dev/null 2>&1; then
            echo "has_videos=true" >> $GITHUB_OUTPUT
            echo "✅ Video files exist."
          else
            echo "has_videos=false" >> $GITHUB_OUTPUT
            echo "⚠️ No video files were downloaded."
          fi

      # ── Release only if at least one video file exists ──────────────
      - name: Create GitHub Release (Public direct download link)
        if: steps.check_videos.outputs.has_videos == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="yt-download-${{ github.run_id }}"
          gh release create "$TAG" videos.zip \
            --title "YouTube Download ${{ github.run_id }}" \
            --notes "Videos downloaded by workflow run [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/$TAG/videos.zip"
          echo "RELEASE_URL=$RELEASE_URL" >> $GITHUB_ENV
          echo "Download link (public, no auth): $RELEASE_URL"

      - name: Save download link to file
        if: steps.check_videos.outputs.has_videos == 'true'
        run: echo "${RELEASE_URL}" > release_url.txt

      - name: Upload release URL artifact
        if: steps.check_videos.outputs.has_videos == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: download-link
          path: release_url.txt
          if-no-files-found: error

      - name: Upload single artifact (original, always uploads)
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Videos
          path: videos.zip
          if-no-files-found: warn
          compression-level: 0

      - name: Stop WARP Container
        if: always()
        run: |
          docker stop warp || true
          docker rm warp || true
